<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Password Manager{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/keyphoria.png">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  {% if show_navbar is defined and show_navbar %}
  <nav class="navbar">
    <div class="navbar-container">
      <div class="nav-menu">
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>Menu</span>
            <svg viewBox="0 0 360 360" xml:space="preserve">
              <path d="M325.607,79.393c-5.857-5.857-15.355-5.858-21.213,0.001l-139.39,139.393L25.607,79.393 c-5.857-5.857-15.355-5.858-21.213,0.001c-5.858,5.858-5.858,15.355,0,21.213l150.004,150c2.813,2.813,6.628,4.393,10.606,4.393 s7.794-1.581,10.606-4.394l149.996-150C331.465,94.749,331.465,85.251,325.607,79.393z" />
            </svg>
          </a>
          <div class="nav-submenu">
            <div class="nav-submenu-item">
              <a href="#" class="nav-submenu-link" onclick="showAddPasswordModal()">Add Password</a>
            </div>

            <div class="nav-submenu-item">
              <a href="/view-passwords" class="nav-submenu-link">View Passwords</a>
            </div>
            <div class="nav-submenu-item">
              <a href="#" class="nav-submenu-link" onclick="logout()">Logout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>
  {% endif %}

  {% block content %}{% endblock %}

  {% block modals %}{% endblock %}

  <div id="notification-modal" class="notification-modal">
    <div class="notification-content">
      <p id="notification-message"></p>
    </div>
  </div>

  <script src="/static/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
