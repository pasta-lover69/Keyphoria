{% set show_navbar = true %}
{% extends "base.html" %}

{% block title %}Your Profile{% endblock %}

{% block content %}
<div class="center-container">
  <div class="card">
    <h1 class="title">Welcome, {{ username }}</h1>
    <p class="subtitle">Manage your passwords securely.</p>
  </div>
</div>
{% endblock %}

{% block modals %}
<div id="add-password-modal" class="modal">
  <form class="neo-form" onsubmit="event.preventDefault(); addPassword();">
    <span class="neo-close" onclick="closeModal('add-password-modal')">&times;</span>
    <div class="neo-title">Add Password<br /><span>store a new credential</span></div>
    <input class="neo-input" id="add-service" name="service" placeholder="Service (e.g. Facebook)" type="text" required />
    <input class="neo-input" id="add-username" name="username" placeholder="Username / Email" type="text" required />
    <input class="neo-input" id="add-password" name="password" placeholder="Password" type="password" required />
    <button class="neo-btn" type="submit">Save Password →</button>
  </form>
</div>
{% endblock %}
