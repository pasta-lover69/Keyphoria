{% extends "base.html" %}

{% block title %}Password Manager - Login{% endblock %}

{% block content %}
<div class="container">
  <div class="card">
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Securely manage your passwords with ease.</p>
    <form id="login-form">
      <div class="input-group">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" placeholder="Enter your username" required />
      </div>
      <div class="input-group">
        <label for="login-password">Password</label>
        <div class="password-container">
          <input id="login-password" type="password" placeholder="Enter your password" required />
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-primary">Log In</button>
      <p id="login-error" class="error-message"></p>
    </form>
    <div class="loading" id="loading-spinner"></div>
    <div class="footer">
      <p>Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>
</div>
{% endblock %}
